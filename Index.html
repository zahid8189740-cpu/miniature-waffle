<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>অদৃশ্য মায়া - M Zixu. Z Panthom</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --bg-secondary: #111118;
            --surface: rgba(25, 25, 40, 0.65);
            --surface-hover: rgba(35, 35, 55, 0.75);
            --text: #e8e0d8;
            --text-secondary: #b8a99a;
            --accent: #c4727a;
            --accent-glow: rgba(196, 114, 122, 0.35);
            --gold: #b8936e;
            --gold-glow: rgba(184, 147, 110, 0.3);
            --border: rgba(255, 255, 255, 0.07);
            --border-strong: rgba(255, 255, 255, 0.13);
            --shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            --shadow-sm: 0 3px 15px rgba(0, 0, 0, 0.35);
            --radius: 20px;
            --radius-sm: 12px;
            --radius-xs: 8px;
            --font-main: 'Noto Sans Bengali', 'SolaimanLipi', 'Siyam Rupali', 'Kalpurush', 'Vrinda', system-ui, sans-serif;
            --transition: 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
            --transition-fast: 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            --blur: 20px;
            --blur-light: 12px;
            --caption-size: 1.35rem;
            --caption-line-height: 2.1;
        }

        .light-mode {
            --bg: #f5f0ea;
            --bg-secondary: #ede6dc;
            --surface: rgba(255, 252, 248, 0.7);
            --surface-hover: rgba(255, 250, 242, 0.85);
            --text: #2a1f1a;
            --text-secondary: #5c4a3d;
            --accent: #b5555f;
            --accent-glow: rgba(181, 85, 95, 0.2);
            --gold: #8b6845;
            --gold-glow: rgba(139, 104, 69, 0.2);
            --border: rgba(0, 0, 0, 0.06);
            --border-strong: rgba(0, 0, 0, 0.11);
            --shadow: 0 8px 40px rgba(0, 0, 0, 0.12);
            --shadow-sm: 0 3px 15px rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        html {
            font-size: 16px;
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg);
            color: var(--text);
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background var(--transition), color var(--transition);
            background-image:
                radial-gradient(ellipse at 25% 20%, rgba(180, 100, 110, 0.06) 0%, transparent 55%),
                radial-gradient(ellipse at 75% 70%, rgba(160, 120, 90, 0.05) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 50%, rgba(140, 100, 130, 0.03) 0%, transparent 70%);
        }

        /* Loading Screen */
        #loading-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease, visibility 0.6s ease;
            opacity: 1;
            visibility: visible;
            background-image:
                radial-gradient(ellipse at center, rgba(180, 110, 120, 0.08) 0%, transparent 65%),
                radial-gradient(ellipse at 40% 45%, rgba(160, 130, 100, 0.04) 0%, transparent 60%);
        }
        #loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .loader-icon {
            width: 70px;
            height: 70px;
            border: 3px solid var(--border-strong);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 28px;
            box-shadow: 0 0 30px var(--accent-glow);
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .loader-title {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: var(--text);
            text-align: center;
            animation: pulse-text 1.8s ease-in-out infinite;
        }
        .loader-subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 8px;
            letter-spacing: 0.06em;
            animation: fade-in-delay 1.2s ease forwards;
            opacity: 0;
        }
        @keyframes pulse-text {
            0%,
            100% {
                opacity: 0.7;
            }
            50% {
                opacity: 1;
            }
        }
        @keyframes fade-in-delay {
            to {
                opacity: 0.8;
            }
        }

        /* Main Container */
        #app-container {
            width: 100%;
            max-width: 500px;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        @media (min-width: 768px) {
            #app-container {
                height: 92vh;
                max-height: 880px;
                border-radius: var(--radius);
                margin: 0 16px;
                border: 1px solid var(--border);
            }
        }

        /* Top Bar */
        #top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            gap: 8px;
            z-index: 100;
            transition: opacity var(--transition-fast), transform var(--transition-fast);
            flex-shrink: 0;
            background: transparent;
        }
        #top-bar.auto-hidden {
            opacity: 0;
            transform: translateY(-60px);
            pointer-events: none;
        }
        .top-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid var(--border-strong);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: all var(--transition-fast);
            backdrop-filter: blur(var(--blur-light));
            -webkit-backdrop-filter: blur(var(--blur-light));
            flex-shrink: 0;
        }
        .top-btn:active {
            transform: scale(0.9);
            background: var(--surface-hover);
            border-color: var(--accent);
        }
        .page-indicator {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
            letter-spacing: 0.03em;
            white-space: nowrap;
            min-width: 70px;
            text-align: center;
            transition: color var(--transition);
        }

        /* Caption Card Area */
        #card-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1200px;
            position: relative;
            padding: 8px 20px;
            z-index: 50;
            touch-action: pan-y;
            overflow: hidden;
        }
        #caption-card {
            width: 100%;
            max-width: 440px;
            min-height: 280px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px 24px 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: var(--shadow-sm);
            backdrop-filter: blur(var(--blur));
            -webkit-backdrop-filter: blur(var(--blur));
            transition: transform 0.45s cubic-bezier(0.25, 0.1, 0.25, 1),
                opacity 0.35s ease,
                box-shadow var(--transition);
            position: relative;
            cursor: default;
            will-change: transform, opacity;
            transform-style: preserve-3d;
        }
        #caption-card.swiping-left {
            transform: translateX(-60px) rotateY(-8deg);
            opacity: 0.6;
            box-shadow: -15px 5px 35px rgba(0, 0, 0, 0.45);
        }
        #caption-card.swiping-right {
            transform: translateX(60px) rotateY(8deg);
            opacity: 0.6;
            box-shadow: 15px 5px 35px rgba(0, 0, 0, 0.45);
        }
        #caption-card.page-turn-next {
            animation: pageTurnNext 0.45s ease forwards;
        }
        #caption-card.page-turn-prev {
            animation: pageTurnPrev 0.45s ease forwards;
        }
        @keyframes pageTurnNext {
            0% {
                transform: rotateY(0);
                opacity: 1;
            }
            40% {
                transform: rotateY(-25deg) translateX(-30px);
                opacity: 0.5;
            }
            100% {
                transform: rotateY(0) translateX(0);
                opacity: 1;
            }
        }
        @keyframes pageTurnPrev {
            0% {
                transform: rotateY(0);
                opacity: 1;
            }
            40% {
                transform: rotateY(25deg) translateX(30px);
                opacity: 0.5;
            }
            100% {
                transform: rotateY(0) translateX(0);
                opacity: 1;
            }
        }
        #caption-card .card-ornament {
            position: absolute;
            top: 16px;
            font-size: 0.75rem;
            color: var(--accent);
            opacity: 0.5;
            letter-spacing: 0.08em;
        }
        #caption-text {
            font-size: var(--caption-size);
            line-height: var(--caption-line-height);
            font-weight: 400;
            color: var(--text);
            transition: font-size var(--transition-fast), color var(--transition);
            z-index: 2;
            position: relative;
            padding: 10px 0;
            word-break: break-word;
            hyphens: auto;
            max-width: 100%;
        }
        #caption-card .card-shadow-accent {
            position: absolute;
            inset: -2px;
            border-radius: var(--radius);
            background: transparent;
            z-index: -1;
            opacity: 0;
            transition: opacity var(--transition);
            pointer-events: none;
            box-shadow: 0 0 40px var(--accent-glow), 0 0 80px var(--gold-glow);
        }
        #caption-card.favorited .card-shadow-accent {
            opacity: 0.7;
        }

        /* Bottom Navigation */
        #bottom-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 10px 16px 14px;
            z-index: 100;
            flex-shrink: 0;
            transition: opacity var(--transition-fast), transform var(--transition-fast);
            flex-wrap: wrap;
        }
        #bottom-nav.auto-hidden {
            opacity: 0;
            transform: translateY(60px);
            pointer-events: none;
        }
        .nav-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid var(--border-strong);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all var(--transition-fast);
            backdrop-filter: blur(var(--blur-light));
            -webkit-backdrop-filter: blur(var(--blur-light));
            flex-shrink: 0;
        }
        .nav-btn:active {
            transform: scale(0.88);
            background: var(--surface-hover);
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .nav-btn.accent-btn {
            background: rgba(196, 114, 122, 0.2);
            border-color: var(--accent);
            color: var(--accent);
            font-weight: 700;
        }
        .nav-btn.accent-btn:active {
            background: rgba(196, 114, 122, 0.35);
            box-shadow: 0 0 25px var(--accent-glow);
        }
        .nav-btn.small-btn {
            width: 34px;
            height: 34px;
            font-size: 0.9rem;
        }

        /* Progress Bar */
        #progress-bar-wrap {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--border);
            z-index: 110;
            border-radius: 0 0 var(--radius) var(--radius);
            overflow: hidden;
        }
        #progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--gold), var(--accent));
            border-radius: inherit;
            transition: width 0.35s ease;
            box-shadow: 0 0 8px var(--accent-glow);
        }

        /* Search Overlay */
        #search-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 30px 16px;
            opacity: 0;
            visibility: hidden;
            transition: opacity var(--transition), visibility var(--transition);
        }
        #search-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        #search-overlay .search-box {
            width: 100%;
            max-width: 440px;
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        #search-input {
            flex: 1;
            padding: 14px 18px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-strong);
            background: var(--surface);
            color: var(--text);
            font-family: var(--font-main);
            font-size: 1rem;
            backdrop-filter: blur(var(--blur));
            -webkit-backdrop-filter: blur(var(--blur));
            outline: none;
            transition: all var(--transition-fast);
        }
        #search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }
        #search-results {
            width: 100%;
            max-width: 440px;
            max-height: 55vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 4px 0;
        }
        .search-result-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-xs);
            padding: 14px 16px;
            cursor: pointer;
            transition: all var(--transition-fast);
            font-size: 0.95rem;
            line-height: 1.7;
            color: var(--text);
            backdrop-filter: blur(var(--blur-light));
            -webkit-backdrop-filter: blur(var(--blur-light));
        }
        .search-result-item:active {
            background: var(--surface-hover);
            border-color: var(--accent);
            transform: scale(0.97);
        }
        .search-result-item .result-num {
            font-size: 0.7rem;
            color: var(--accent);
            display: block;
            margin-bottom: 4px;
            letter-spacing: 0.04em;
        }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--surface);
            border: 1px solid var(--border-strong);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            z-index: 300;
            opacity: 0;
            pointer-events: none;
            transition: all var(--transition-fast);
            backdrop-filter: blur(var(--blur));
            -webkit-backdrop-filter: blur(var(--blur));
            white-space: nowrap;
            letter-spacing: 0.03em;
            box-shadow: var(--shadow-sm);
        }
        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Favorites Panel */
        #favorites-panel {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 30px 16px;
            opacity: 0;
            visibility: hidden;
            transition: opacity var(--transition), visibility var(--transition);
        }
        #favorites-panel.active {
            opacity: 1;
            visibility: visible;
        }
        #favorites-panel h3 {
            color: var(--text);
            margin-bottom: 16px;
            font-size: 1.2rem;
            letter-spacing: 0.04em;
        }
        #favorites-list {
            width: 100%;
            max-width: 440px;
            max-height: 55vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .fav-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-xs);
            padding: 12px 14px;
            cursor: pointer;
            transition: all var(--transition-fast);
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(var(--blur-light));
            -webkit-backdrop-filter: blur(var(--blur-light));
        }
        .fav-item:active {
            background: var(--surface-hover);
            transform: scale(0.97);
        }
        .fav-remove {
            color: var(--accent);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 6px;
            flex-shrink: 0;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-strong);
            border-radius: 4px;
        }

        /* Responsive */
        @media (max-width: 380px) {
            #caption-text {
                font-size: 1.15rem;
                line-height: 1.9;
            }
            #caption-card {
                padding: 24px 16px 20px;
                min-height: 220px;
            }
            .nav-btn {
                width: 38px;
                height: 38px;
                font-size: 1rem;
            }
            .top-btn {
                width: 32px;
                height: 32px;
                font-size: 0.9rem;
            }
        }
        @media (min-width: 420px) {
            #caption-text {
                font-size: 1.45rem;
                line-height: 2.2;
            }
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loader-icon"></div>
        <div class="loader-title">অদৃশ্য মায়া</div>
        <div class="loader-subtitle">M Zixu. Z Panthom</div>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <!-- Main App -->
    <div id="app-container">
        <!-- Top Bar -->
        <div id="top-bar">
            <button class="top-btn" id="btn-menu" title="মেনু" aria-label="মেনু">☰</button>
            <span class="page-indicator" id="page-indicator">১ / ৫০০+</span>
            <div style="display:flex;gap:6px;">
                <button class="top-btn small-btn" id="btn-font-minus" title="ছোট অক্ষর" aria-label="ছোট অক্ষর">A⁻</button>
                <button class="top-btn small-btn" id="btn-font-plus" title="বড় অক্ষর" aria-label="বড় অক্ষর">A⁺</button>
                <button class="top-btn" id="btn-theme" title="থিম পরিবর্তন" aria-label="থিম পরিবর্তন">🌓</button>
            </div>
        </div>

        <!-- Caption Card Area -->
        <div id="card-area">
            <div id="caption-card">
                <span class="card-ornament">✦</span>
                <div class="card-shadow-accent"></div>
                <p id="caption-text"></p>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div id="bottom-nav">
            <button class="nav-btn" id="btn-prev" title="আগের পৃষ্ঠা" aria-label="আগের পৃষ্ঠা">◀</button>
            <button class="nav-btn accent-btn" id="btn-random" title="এলোমেলো" aria-label="এলোমেলো">⟳</button>
            <button class="nav-btn" id="btn-fav" title="প্রিয়তে যোগ করুন" aria-label="প্রিয়তে যোগ করুন">♡</button>
            <button class="nav-btn" id="btn-copy" title="কপি করুন" aria-label="কপি করুন">📋</button>
            <button class="nav-btn" id="btn-share" title="শেয়ার করুন" aria-label="শেয়ার করুন">↗</button>
            <button class="nav-btn" id="btn-next" title="পরের পৃষ্ঠা" aria-label="পরের পৃষ্ঠা">▶</button>
        </div>

        <!-- Progress Bar -->
        <div id="progress-bar-wrap">
            <div id="progress-bar-fill" style="width:0%;"></div>
        </div>
    </div>

    <!-- Search Overlay -->
    <div id="search-overlay">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="ক্যাপশন খুঁজুন... (কীওয়ার্ড)">
            <button class="top-btn" id="btn-search-close" style="width:44px;height:44px;font-size:1.3rem;">✕</button>
        </div>
        <div id="search-results"></div>
    </div>

    <!-- Favorites Panel -->
    <div id="favorites-panel">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
            <h3 style="margin:0;">❤️ প্রিয় ক্যাপশন</h3>
            <button class="top-btn" id="btn-fav-close" style="width:38px;height:38px;">✕</button>
        </div>
        <div id="favorites-list"></div>
    </div>

    <script>
        (function() {
            // ──────────────────────────────────────
            // CAPTIONS DATABASE — 500+ unique Bengali quotes
            // ──────────────────────────────────────
            const captions = [
                // Group: Breakup & Separation (~65)
                "ভালোবাসার সবচেয়ে কঠিন অধ্যায় হলো সেই মুহূর্ত, যখন দুজন মানুষ একসঙ্গে থেকেও আলাদা হয়ে যায়।",
                "তোমাকে হারানোর বেদনা প্রতিদিন নতুন করে জাগে, যেন ভোরের কুয়াশার মতো ধীরে ধীরে ছেয়ে ফেলে সবকিছু।",
                "যে সম্পর্কের ভিত নড়বড়ে, সে সম্পর্ক টিকে থাকলেও তার মধ্যে সুখ খুঁজে পাওয়া দুষ্কর।",

            // ──────────────────────────────────────
            // APP STATE
            // ──────────────────────────────────────
            const totalCaptions = captions.length;
            let currentPage = 0;
            let fontSizeLevel = 2; // 0=small, 1=medium-small, 2=default, 3=large, 4=xlarge
            const fontSizeValues = ['1rem', '1.2rem', '1.35rem', '1.55rem', '1.75rem'];
            const lineHeightValues = ['1.7', '1.9', '2.1', '2.3', '2.5'];
            let isDarkMode = true;
            let favorites = [];
            let autoHideTimer = null;
            let touchStartX = 0;
            let touchStartY = 0;
            let touchMoved = false;
            let isSwiping = false;
            let swipeThreshold = 50;

            // ──────────────────────────────────────
            // DOM REFS
            // ──────────────────────────────────────
            const loadingScreen = document.getElementById('loading-screen');
            const appContainer = document.getElementById('app-container');
            const topBar = document.getElementById('top-bar');
            const bottomNav = document.getElementById('bottom-nav');
            const captionCard = document.getElementById('caption-card');
            const captionText = document.getElementById('caption-text');
            const pageIndicator = document.getElementById('page-indicator');
            const progressFill = document.getElementById('progress-bar-fill');
            const searchOverlay = document.getElementById('search-overlay');
            const searchInput = document.getElementById('search-input');
            const searchResults = document.getElementById('search-results');
            const favoritesPanel = document.getElementById('favorites-panel');
            const favoritesList = document.getElementById('favorites-list');
            const toast = document.getElementById('toast');
            const btnFav = document.getElementById('btn-fav');

            // ──────────────────────────────────────
            // INIT
            // ──────────────────────────────────────
            function init() {
                loadFromStorage();
                updateCaptionDisplay();
                updatePageIndicator();
                updateProgressBar();
                updateFavButton();
                applyFontSize();
                applyTheme();
                setupEventListeners();
                // Hide loading screen
                setTimeout(() => {
                    loadingScreen.classList.add('hidden');
                }, 800);
            }

            function loadFromStorage() {
                try {
                    const saved = localStorage.getItem('odrishya_maya_page');
                    if (saved !== null) {
                        const p = parseInt(saved);
                        if (!isNaN(p) && p >= 0 && p < totalCaptions) {
                            currentPage = p;
                        }
                    }
                    const savedFavs = localStorage.getItem('odrishya_maya_favorites');
                    if (savedFavs) {
                        favorites = JSON.parse(savedFavs);
                        if (!Array.isArray(favorites)) favorites = [];
                    }
                    const savedFont = localStorage.getItem('odrishya_maya_font');
                    if (savedFont !== null) {
                        const f = parseInt(savedFont);
                        if (!isNaN(f) && f >= 0 && f <= 4) fontSizeLevel = f;
                    }
                    const savedTheme = localStorage.getItem('odrishya_maya_theme');
                    if (savedTheme === 'light') isDarkMode = false;
                } catch (e) {
                    // ignore
                }
            }

            function saveToStorage() {
                try {
                    localStorage.setItem('odrishya_maya_page', currentPage);
                    localStorage.setItem('odrishya_maya_favorites', JSON.stringify(favorites));
                    localStorage.setItem('odrishya_maya_font', fontSizeLevel);
                    localStorage.setItem('odrishya_maya_theme', isDarkMode ? 'dark' : 'light');
                } catch (e) {
                    // ignore
                }
            }

            // ──────────────────────────────────────
            // UI UPDATES
            // ──────────────────────────────────────
            function updateCaptionDisplay(animationClass = '') {
                captionText.textContent = captions[currentPage];
                if (animationClass) {
                    captionCard.classList.add(animationClass);
                    setTimeout(() => {
                        captionCard.classList.remove(animationClass);
                    }, 460);
                }
                updateFavButton();
                updatePageIndicator();
                updateProgressBar();
                saveToStorage();
                // Update card accent
                if (favorites.includes(currentPage)) {
                    captionCard.classList.add('favorited');
                } else {
                    captionCard.classList.remove('favorited');
                }
            }

            function updatePageIndicator() {
                pageIndicator.textContent = `${currentPage + 1} / ${totalCaptions}`;
            }

            function updateProgressBar() {
                const pct = ((currentPage + 1) / totalCaptions) * 100;
                progressFill.style.width = pct + '%';
            }

            function updateFavButton() {
                if (favorites.includes(currentPage)) {
                    btnFav.textContent = '❤️';
                    btnFav.classList.add('accent-btn');
                } else {
                    btnFav.textContent = '♡';
                    btnFav.classList.remove('accent-btn');
                }
            }

            function applyFontSize() {
                captionText.style.fontSize = fontSizeValues[fontSizeLevel];
                captionText.style.lineHeight = lineHeightValues[fontSizeLevel];
            }

            function applyTheme() {
                if (isDarkMode) {
                    document.body.classList.remove('light-mode');
                } else {
                    document.body.classList.add('light-mode');
                }
            }

            function showToast(msg) {
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(toast._timeout);
                toast._timeout = setTimeout(() => {
                    toast.classList.remove('show');
                }, 1800);
            }

            // ──────────────────────────────────────
            // NAVIGATION
            // ──────────────────────────────────────
            function goToPage(index, animationClass = '') {
                if (index < 0 || index >= totalCaptions) return;
                if (index === currentPage) return;
                currentPage = index;
                updateCaptionDisplay(animationClass);
            }

            function nextPage() {
                if (currentPage < totalCaptions - 1) {
                    goToPage(currentPage + 1, 'page-turn-next');
                } else {
                    showToast('এটাই শেষ পৃষ্ঠা 📖');
                }
            }

            function prevPage() {
                if (currentPage > 0) {
                    goToPage(currentPage - 1, 'page-turn-prev');
                } else {
                    showToast('এটাই প্রথম পৃষ্ঠা 📖');
                }
            }

            function randomPage() {
                let newPage;
                do {
                    newPage = Math.floor(Math.random() * totalCaptions);
                } while (newPage === currentPage && totalCaptions > 1);
                goToPage(newPage, 'page-turn-next');
            }

            function toggleFavorite() {
                const idx = favorites.indexOf(currentPage);
                if (idx > -1) {
                    favorites.splice(idx, 1);
                    showToast('প্রিয় থেকে সরানো হয়েছে 💔');
                } else {
                    favorites.push(currentPage);
                    showToast('প্রিয়তে যোগ করা হয়েছে ❤️');
                }
                updateFavButton();
                if (favorites.includes(currentPage)) {
                    captionCard.classList.add('favorited');
                } else {
                    captionCard.classList.remove('favorited');
                }
                saveToStorage();
            }

            function copyCaption() {
                const text = captions[currentPage];
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text).then(() => {
                        showToast('কপি করা হয়েছে ✅');
                    }).catch(() => {
                        fallbackCopy(text);
                    });
                } else {
                    fallbackCopy(text);
                }
            }

            function fallbackCopy(text) {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.left = '-9999px';
                ta.style.top = '-9999px';
                document.body.appendChild(ta);
                ta.focus();
                ta.select();
                try {
                    document.execCommand('copy');
                    showToast('কপি করা হয়েছে ✅');
                } catch (e) {
                    showToast('কপি করা যায়নি 😕');
                }
                document.body.removeChild(ta);
            }

            function shareCaption() {
                const text = captions[currentPage];
                const shareData = {
                    title: 'অদৃশ্য মায়া - M Zixu. Z Panthom',
                    text: text + '\n\n— অদৃশ্য মায়া (M Zixu. Z Panthom)',
                };
                if (navigator.share && navigator.canShare && navigator.canShare(shareData)) {
                    navigator.share(shareData).catch(() => {
                        copyCaption();
                        showToast('শেয়ার করা গেল না, কপি করা হয়েছে 📋');
                    });
                } else {
                    copyCaption();
                    showToast('শেয়ার করতে কপি করা হয়েছে 📋');
                }
            }

            // ──────────────────────────────────────
            // SEARCH
            // ──────────────────────────────────────
            function openSearch() {
                searchOverlay.classList.add('active');
                searchInput.value = '';
                searchResults.innerHTML = '';
                setTimeout(() => searchInput.focus(), 300);
            }

            function closeSearch() {
                searchOverlay.classList.remove('active');
                searchInput.value = '';
                searchResults.innerHTML = '';
            }

            function performSearch() {
                const query = searchInput.value.trim().toLowerCase();
                if (query.length < 2) {
                    searchResults.innerHTML =
                        '<p style="color:var(--text-secondary);text-align:center;padding:20px;">অন্তত ২টি অক্ষর লিখুন...</p>';
                    return;
                }
                const results = [];
                captions.forEach((cap, idx) => {
                    if (cap.toLowerCase().includes(query)) {
                        results.push({ index: idx, text: cap });
                    }
                });
                if (results.length === 0) {
                    searchResults.innerHTML =
                        '<p style="color:var(--text-secondary);text-align:center;padding:20px;">কিছু পাওয়া যায়নি 🔍</p>';
                } else {
                    searchResults.innerHTML = results.map(r => `
                <div class="search-result-item" data-index="${r.index}">
                  <span class="result-num">পৃষ্ঠা ${r.index + 1}</span>
                  ${highlightMatch(r.text, query)}
                </div>
              `).join('');
                    // Add click listeners
                    searchResults.querySelectorAll('.search-result-item').forEach(item => {
                        item.addEventListener('click', function() {
                            const idx = parseInt(this.getAttribute('data-index'));
                            goToPage(idx, 'page-turn-next');
                            closeSearch();
                        });
                    });
                }
            }

            function highlightMatch(text, query) {
                const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
                return text.replace(regex,
                    '<mark style="background:var(--accent-glow);color:var(--accent);padding:1px 4px;border-radius:3px;">$1</mark>'
                    );
            }

            // ──────────────────────────────────────
            // FAVORITES PANEL
            // ──────────────────────────────────────
            function openFavorites() {
                favoritesPanel.classList.add('active');
                renderFavorites();
            }

            function closeFavorites() {
                favoritesPanel.classList.remove('active');
            }

            function renderFavorites() {
                if (favorites.length === 0) {
                    favoritesList.innerHTML =
                        '<p style="color:var(--text-secondary);text-align:center;padding:20px;">এখনো কোনো প্রিয় ক্যাপশন নেই 💔</p>';
                } else {
                    favoritesList.innerHTML = favorites.map(fIdx => `
                <div class="fav-item" data-index="${fIdx}">
                  <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px;">
                    ${captions[fIdx].substring(0, 55)}...
                  </span>
                  <span class="fav-remove" data-index="${fIdx}" title="সরান">✕</span>
                </div>
              `).join('');
                    // Click to navigate
                    favoritesList.querySelectorAll('.fav-item').forEach(item => {
                        item.addEventListener('click', function(e) {
                            if (e.target.classList.contains('fav-remove')) return;
                            const idx = parseInt(this.getAttribute('data-index'));
                            goToPage(idx, 'page-turn-next');
                            closeFavorites();
                        });
                    });
                    // Remove button
                    favoritesList.querySelectorAll('.fav-remove').forEach(btn => {
                        btn.addEventListener('click', function(e) {
                            e.stopPropagation();
                            const idx = parseInt(this.getAttribute('data-index'));
                            const arrIdx = favorites.indexOf(idx);
                            if (arrIdx > -1) {
                                favorites.splice(arrIdx, 1);
                                saveToStorage();
                                renderFavorites();
                                updateFavButton();
                                if (favorites.includes(currentPage)) {
                                    captionCard.classList.add('favorited');
                                } else {
                                    captionCard.classList.remove('favorited');
                                }
                                showToast('প্রিয় থেকে সরানো হয়েছে 💔');
                            }
                        });
                    });
                }
            }

            // ──────────────────────────────────────
            // AUTO-HIDE CONTROLS
            // ──────────────────────────────────────
            function resetAutoHide() {
                topBar.classList.remove('auto-hidden');
                bottomNav.classList.remove('auto-hidden');
                clearTimeout(autoHideTimer);
                autoHideTimer = setTimeout(() => {
                    topBar.classList.add('auto-hidden');
                    bottomNav.classList.add('auto-hidden');
                }, 4000);
            }

            // ──────────────────────────────────────
            // TOUCH / SWIPE
            // ──────────────────────────────────────
            function handleTouchStart(e) {
                if (e.target.closest('button') || e.target.closest('input') ||
                    e.target.closest('#search-overlay') || e.target.closest('#favorites-panel')) {
                    return;
                }
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
                touchMoved = false;
                isSwiping = false;
                captionCard.classList.remove('swiping-left', 'swiping-right');
            }

            function handleTouchMove(e) {
                if (e.target.closest('button') || e.target.closest('input') ||
                    e.target.closest('#search-overlay') || e.target.closest('#favorites-panel')) {
                    return;
                }
                const dx = e.touches[0].clientX - touchStartX;
                const dy = e.touches[0].clientY - touchStartY;
                if (Math.abs(dx) > 8 && Math.abs(dx) > Math.abs(dy)) {
                    touchMoved = true;
                    isSwiping = true;
                    if (dx < -15) {
                        captionCard.classList.add('swiping-left');
                        captionCard.classList.remove('swiping-right');
                    } else if (dx > 15) {
                        captionCard.classList.add('swiping-right');
                        captionCard.classList.remove('swiping-left');
                    }
                    e.preventDefault();
                }
            }

            function handleTouchEnd(e) {
                captionCard.classList.remove('swiping-left', 'swiping-right');
                if (!touchMoved || !isSwiping) return;
                const dx = e.changedTouches[0].clientX - touchStartX;
                if (dx < -swipeThreshold) {
                    nextPage();
                } else if (dx > swipeThreshold) {
                    prevPage();
                }
                isSwiping = false;
                touchMoved = false;
            }

            // ──────────────────────────────────────
            // EVENT LISTENERS
            // ──────────────────────────────────────
            function setupEventListeners() {
                // Navigation buttons
                document.getElementById('btn-next').addEventListener('click', () => { nextPage();
                    resetAutoHide(); });
                document.getElementById('btn-prev').addEventListener('click', () => { prevPage();
                    resetAutoHide(); });
                document.getElementById('btn-random').addEventListener('click', () => { randomPage();
                    resetAutoHide(); });
                document.getElementById('btn-fav').addEventListener('click', () => { toggleFavorite();
                    resetAutoHide(); });
                document.getElementById('btn-copy').addEventListener('click', () => { copyCaption();
                    resetAutoHide(); });
                document.getElementById('btn-share').addEventListener('click', () => { shareCaption();
                    resetAutoHide(); });

                // Font size
                document.getElementById('btn-font-plus').addEventListener('click', () => {
                    if (fontSizeLevel < 4) fontSizeLevel++;
                    applyFontSize();
                    saveToStorage();
                    resetAutoHide();
                });
                document.getElementById('btn-font-minus').addEventListener('click', () => {
                    if (fontSizeLevel > 0) fontSizeLevel--;
                    applyFontSize();
                    saveToStorage();
                    resetAutoHide();
                });

                // Theme toggle
                document.getElementById('btn-theme').addEventListener('click', () => {
                    isDarkMode = !isDarkMode;
                    applyTheme();
                    saveToStorage();
                    resetAutoHide();
                });

                // Menu button opens search
                document.getElementById('btn-menu').addEventListener('click', () => {
                    openSearch();
                    resetAutoHide();
                });

                // Search
                document.getElementById('btn-search-close').addEventListener('click', closeSearch);
                searchInput.addEventListener('input', performSearch);
                searchOverlay.addEventListener('click', function(e) {
                    if (e.target === searchOverlay) closeSearch();
                });

                // Favorites panel
                document.getElementById('btn-fav-close').addEventListener('click', closeFavorites);
                favoritesPanel.addEventListener('click', function(e) {
                    if (e.target === favoritesPanel) closeFavorites();
                });
                // Long press on fav button opens favorites panel
                let favPressTimer;
                btnFav.addEventListener('mousedown', () => {
                    favPressTimer = setTimeout(() => { openFavorites(); }, 600);
                });
                btnFav.addEventListener('mouseup', () => { clearTimeout(favPressTimer); });
                btnFav.addEventListener('mouseleave', () => { clearTimeout(favPressTimer); });
                btnFav.addEventListener('touchstart', () => {
                    favPressTimer = setTimeout(() => { openFavorites(); }, 600);
                }, { passive: true });
                btnFav.addEventListener('touchend', () => { clearTimeout(favPressTimer); });
                btnFav.addEventListener('touchmove', () => { clearTimeout(favPressTimer); });

                // Touch swipe on card area
                const cardArea = document.getElementById('card-area');
                cardArea.addEventListener('touchstart', handleTouchStart, { passive: false });
                cardArea.addEventListener('touchmove', handleTouchMove, { passive: false });
                cardArea.addEventListener('touchend', handleTouchEnd);

                // Keyboard navigation
                document.addEventListener('keydown', function(e) {
                    if (searchOverlay.classList.contains('active') || favoritesPanel.classList.contains(
                            'active')) {
                        if (e.key === 'Escape') {
                            closeSearch();
                            closeFavorites();
                        }
                        return;
                    }
                    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault();
                        nextPage();
                        resetAutoHide(); }
                    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault();
                        prevPage();
                        resetAutoHide(); }
                    if (e.key === 'r' || e.key === 'R') { randomPage();
                        resetAutoHide(); }
                    if (e.key === 'f' || e.key === 'F') { toggleFavorite();
                        resetAutoHide(); }
                    if (e.key === 'c' || e.key === 'C') { copyCaption();
                        resetAutoHide(); }
                    if (e.key === '/') { e.preventDefault();
                        openSearch(); }
                });

                // General touch to reset auto-hide
                document.addEventListener('click', function(e) {
                    if (!e.target.closest('#search-overlay') && !e.target.closest('#favorites-panel')) {
                        resetAutoHide();
                    }
                });
                document.addEventListener('touchstart', function(e) {
                    if (!e.target.closest('#search-overlay') && !e.target.closest('#favorites-panel') && !e
                        .target.closest('button') && !e.target.closest('input')) {
                        resetAutoHide();
                    }
                }, { passive: true });

                // Initial auto-hide
                resetAutoHide();
            }

            // ──────────────────────────────────────
            // START APP
            // ──────────────────────────────────────
            init();

            console.log('📖 অদৃশ্য মায়া — M Zixu. Z Panthom');
            console.log('✨ ' + totalCaptions + ' unique Bengali captions ready.');
            console.log('📄 Current page: ' + (currentPage + 1));
            console.log('💡 Swipe left/right • Arrow keys • Search with / key • Long-press ❤️ for favorites');
        })();
    </script>
</body>
</html>
